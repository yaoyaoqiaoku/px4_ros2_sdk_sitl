# mqtt_home_control.yaml
# MQTT Home Position Control Configuration
# This file contains configuration parameters for the mqtt_home_control node

mqtt_home_control:
  ros__parameters:
    # UAV identification
    # Name/ID of the UAV (used in MQTT topic and client ID)
    uav_name: "uav2"
    
    # MQTT broker configuration
    # Broker address in format: tcp://host:port or mqtt://host:port
    # Note: mqtt:// will be automatically converted to tcp://
    mqtt_broker: "tcp://message.laidnt.com:1883"
    
    # MQTT authentication
    # Username for MQTT broker authentication (leave empty if no auth required)
    mqtt_username: "admin"
    
    # Password for MQTT broker authentication (leave empty if no auth required)
    mqtt_password: "qyzx@2025"
    
    # MQTT topic configuration
    # Topic prefix for home position commands. Final topic will be: {mqtt_home_topic}{uav_name}
    # Example: if mqtt_home_topic is "uavcontrol/home/" and uav_name is "uav1",
    #          the final topic will be "uavcontrol/home/uav1"
    mqtt_home_topic: "uavcontrol/home/"
