# mqtt_servo_control.yaml
# MQTT Servo Control Configuration
# This file contains configuration parameters for the mqtt_servo_control node

mqtt_servo_control:
  ros__parameters:
    # UAV identification
    # Name/ID of the UAV (used in MQTT topic and client ID)
    uav_name: "uav1"
    
    # MQTT broker configuration
    # Broker address in format: tcp://host:port or mqtt://host:port
    # Note: mqtt:// will be automatically converted to tcp://
    mqtt_broker: "tcp://162.14.193.2:1883"
    
    # MQTT authentication
    # Username for MQTT broker authentication (leave empty if no auth required)
    mqtt_username: "admin"
    
    # Password for MQTT broker authentication (leave empty if no auth required)
    mqtt_password: "qyzx@2025"
    
    # MQTT topic configuration
    # Topic prefix for servo commands. Final topic will be: {mqtt_servo_topic}{uav_name}
    # Example: if mqtt_servo_topic is "uavcontrol/servo/" and uav_name is "uav1",
    #          the final topic will be "uavcontrol/servo/uav1"
    mqtt_servo_topic: "uavcontrol/servo/"